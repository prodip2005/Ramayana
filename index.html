<!doctype html>
<html lang="en" data-theme="ramayan">
  <head>

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>Valmiki Ramayana | The Eternal Epic - Prodip Hore</title>

    <style>
      /* ── Aggressively hide ALL Google Translate UI chrome ── */
      .goog-te-banner-frame,
      .goog-te-banner-frame.skiptranslate,
      #goog-gt-tt,
      .goog-te-balloon-frame,
      div#goog-gt-,
      .VIpgJd-ZVi9od-aZ2wEe-wOHMyf,
      .VIpgJd-ZVi9od-aZ2wEe {
        display: none !important;
      }

      /* Prevent Google from pushing the page down */
      body {
        top: 0 !important;
        position: static !important;
      }
      html body {
        margin-top: 0 !important;
      }

      /* Hide branding & gadget text */
      .goog-logo-link,
      .goog-te-gadget span,
      .goog-te-gadget > span {
        display: none !important;
      }
      .goog-te-gadget {
        font-size: 0 !important;
        line-height: 0 !important;
      }
      #google_translate_element {
        display: none;
      }

      /* Floating translate button */
      #gt-toggle-btn {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 9999;
        background: #b5451b;
        color: #f7eedc;
        border: none;
        border-radius: 50px;
        padding: 10px 20px;
        font-family: 'Cinzel', serif;
        font-size: 10px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(61, 12, 2, 0.3);
        display: flex;
        align-items: center;
        gap: 8px;
        transition:
          background 0.3s,
          transform 0.2s;
      }
      #gt-toggle-btn:hover {
        background: #3d0c02;
        transform: translateY(-2px);
      }

      /* Dropdown panel */
      #gt-panel {
        position: fixed;
        bottom: 72px;
        right: 24px;
        z-index: 9998;
        background: #fdf2da;
        border: 1px solid rgba(181, 69, 27, 0.25);
        border-radius: 14px;
        padding: 16px;
        box-shadow: 0 12px 40px rgba(61, 12, 2, 0.2);
        display: none;
        flex-direction: column;
        gap: 10px;
        width: 240px;
      }
      #gt-panel.open {
        display: flex;
      }

      #gt-panel-label {
        font-family: 'Cinzel', serif;
        font-size: 9px;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: rgba(61, 12, 2, 0.45);
        font-weight: 700;
        text-align: center;
      }

      #gt-search {
        width: 100%;
        box-sizing: border-box;
        background: #fff8ed;
        border: 1px solid rgba(181, 69, 27, 0.3);
        border-radius: 8px;
        padding: 8px 10px;
        font-family: 'Georgia', serif;
        font-size: 13px;
        color: #3d0c02;
        outline: none;
      }
      #gt-search:focus {
        border-color: #b5451b;
      }
      #gt-search::placeholder {
        color: rgba(61, 12, 2, 0.35);
        font-style: italic;
      }

      #gt-lang-list {
        list-style: none;
        margin: 0;
        padding: 0;
        max-height: 220px;
        overflow-y: auto;
        border-radius: 8px;
        border: 1px solid rgba(181, 69, 27, 0.15);
        background: #fff8ed;
      }
      #gt-lang-list li {
        padding: 9px 12px;
        font-family: 'Georgia', serif;
        font-size: 13px;
        color: #3d0c02;
        cursor: pointer;
        border-bottom: 1px solid rgba(181, 69, 27, 0.08);
        transition: background 0.15s;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      #gt-lang-list li:last-child {
        border-bottom: none;
      }
      #gt-lang-list li:hover {
        background: rgba(181, 69, 27, 0.1);
      }
      #gt-lang-list li.gt-active {
        background: #b5451b;
        color: #f7eedc;
        font-weight: 600;
      }
      #gt-lang-list li .lang-native {
        font-size: 11px;
        opacity: 0.6;
      }
      #gt-lang-list li.gt-active .lang-native {
        opacity: 0.85;
      }

      #gt-lang-list::-webkit-scrollbar {
        width: 4px;
      }
      #gt-lang-list::-webkit-scrollbar-track {
        background: transparent;
      }
      #gt-lang-list::-webkit-scrollbar-thumb {
        background: rgba(181, 69, 27, 0.3);
        border-radius: 4px;
      }

      #gt-lang-list li.gt-default {
        background: rgba(181, 69, 27, 0.05);
        border-bottom: 2px solid rgba(181, 69, 27, 0.15) !important;
        font-weight: 600;
        color: #b5451b;
      }
      #gt-lang-list li.gt-default:hover {
        background: rgba(181, 69, 27, 0.12);
      }
      #gt-lang-list li.gt-default .lang-native {
        color: #b5451b;
        opacity: 0.7;
      }

      #gt-no-result {
        padding: 12px;
        text-align: center;
        font-family: 'Georgia', serif;
        font-size: 12px;
        color: rgba(61, 12, 2, 0.4);
        font-style: italic;
      }

      /* Responsive rules for mobile devices */
      @media screen and (max-width: 640px) {
        #gt-toggle-btn {
          bottom: 12px;
          right: 12px;
          padding: 8px 14px;
          font-size: 9px;
          box-sizing: border-box;
          max-width: calc(100vw - 24px);
        }
        #gt-panel {
          bottom: 60px;
          right: 12px;
          width: 240px;
          max-width: calc(100vw - 24px);
          padding: 12px;
          box-sizing: border-box;
        }
      }
    </style>
  </head>
  <body class="bg-base-100 transition-colors duration-300">
    <div id="app"></div>

    <!-- Hidden Google Translate element (needed for the API) -->
    <div id="google_translate_element"></div>

    <!-- Floating Translate Button -->
    <button
      id="gt-toggle-btn"
      onclick="gtTogglePanel()"
      translate="no"
      class="notranslate"
    >
      <i class="fa-solid fa-language"></i>
      Translate
    </button>

    <!-- Language Selection Panel -->
    <div id="gt-panel" translate="no" class="notranslate">
      <span id="gt-panel-label">Choose Language</span>
      <input
        id="gt-search"
        type="text"
        placeholder="Search language..."
        oninput="gtFilterLangs(this.value)"
        autocomplete="off"
        translate="no"
      />
      <ul id="gt-lang-list"></ul>
    </div>

    <script>
      // Full language list — Bengali, English, Hindi, Sanskrit first
      var GT_LANGS = [
        { code: 'bn', name: 'Bengali', native: 'বাংলা' },
        { code: 'en', name: 'English', native: 'English' },
        { code: 'hi', name: 'Hindi', native: 'हिन्दी' },
        { code: 'sa', name: 'Sanskrit', native: 'संस्कृत' },
        { code: 'af', name: 'Afrikaans', native: 'Afrikaans' },
        { code: 'sq', name: 'Albanian', native: 'Shqip' },
        { code: 'ar', name: 'Arabic', native: 'العربية' },
        { code: 'hy', name: 'Armenian', native: 'Հայερեն' },
        { code: 'az', name: 'Azerbaijani', native: 'Azərbaycan' },
        { code: 'eu', name: 'Basque', native: 'Euskara' },
        { code: 'be', name: 'Belarusian', native: 'Беларуская' },
        { code: 'bs', name: 'Bosnian', native: 'Bosanski' },
        { code: 'bg', name: 'Bulgarian', native: 'Български' },
        { code: 'ca', name: 'Catalan', native: 'Català' },
        { code: 'zh-CN', name: 'Chinese (Simplified)', native: '中文(简体)' },
        { code: 'zh-TW', name: 'Chinese (Traditional)', native: '中文(繁體)' },
        { code: 'hr', name: 'Croatian', native: 'Hrvatski' },
        { code: 'cs', name: 'Czech', native: 'Čeština' },
        { code: 'da', name: 'Danish', native: 'Dansk' },
        { code: 'nl', name: 'Dutch', native: 'Nederlands' },
        { code: 'eo', name: 'Esperanto', native: 'Esperanto' },
        { code: 'et', name: 'Estonian', native: 'Eesti' },
        { code: 'tl', name: 'Filipino', native: 'Filipino' },
        { code: 'fi', name: 'Finnish', native: 'Suomi' },
        { code: 'fr', name: 'French', native: 'Français' },
        { code: 'gl', name: 'Galician', native: 'Galego' },
        { code: 'ka', name: 'Georgian', native: 'ქართული' },
        { code: 'de', name: 'German', native: 'Deutsch' },
        { code: 'el', name: 'Greek', native: 'Ελληνικά' },
        { code: 'gu', name: 'Gujarati', native: 'ગુજરાતી' },
        { code: 'ht', name: 'Haitian Creole', native: 'Kreyòl' },
        { code: 'he', name: 'Hebrew', native: 'עברית' },
        { code: 'hu', name: 'Hungarian', native: 'Magyar' },
        { code: 'is', name: 'Icelandic', native: 'Íslenska' },
        { code: 'id', name: 'Indonesian', native: 'Bahasa Indonesia' },
        { code: 'ga', name: 'Irish', native: 'Gaeilge' },
        { code: 'it', name: 'Italian', native: 'Italiano' },
        { code: 'ja', name: 'Japanese', native: '日本語' },
        { code: 'kn', name: 'Kannada', native: 'ಕನ್ನಡ' },
        { code: 'ko', name: 'Korean', native: '한국어' },
        { code: 'la', name: 'Latin', native: 'Latina' },
        { code: 'lv', name: 'Latvian', native: 'Latviešu' },
        { code: 'lt', name: 'Lithuanian', native: 'Lietuvių' },
        { code: 'mk', name: 'Macedonian', native: 'Македонски' },
        { code: 'ms', name: 'Malay', native: 'Bahasa Melayu' },
        { code: 'ml', name: 'Malayalam', native: 'മലയാളം' },
        { code: 'mt', name: 'Maltese', native: 'Malti' },
        { code: 'mr', name: 'Marathi', native: 'मराठी' },
        { code: 'ne', name: 'Nepali', native: 'नेपाली' },
        { code: 'no', name: 'Norwegian', native: 'Norsk' },
        { code: 'fa', name: 'Persian', native: 'فارسی' },
        { code: 'pl', name: 'Polish', native: 'Polski' },
        { code: 'pt', name: 'Portuguese', native: 'Português' },
        { code: 'pa', name: 'Punjabi', native: 'ਪੰਜਾਬੀ' },
        { code: 'ro', name: 'Romanian', native: 'Română' },
        { code: 'ru', name: 'Russian', native: 'Русский' },
        { code: 'sr', name: 'Serbian', native: 'Српски' },
        { code: 'sk', name: 'Slovak', native: 'Slovenčina' },
        { code: 'sl', name: 'Slovenian', native: 'Slovenščina' },
        { code: 'es', name: 'Spanish', native: 'Español' },
        { code: 'sw', name: 'Swahili', native: 'Kiswahili' },
        { code: 'sv', name: 'Swedish', native: 'Svenska' },
        { code: 'ta', name: 'Tamil', native: 'தமிழ்' },
        { code: 'te', name: 'Telugu', native: 'తెలుగు' },
        { code: 'th', name: 'Thai', native: 'ภาษาไทย' },
        { code: 'tr', name: 'Turkish', native: 'Türkçe' },
        { code: 'uk', name: 'Ukrainian', native: 'Українська' },
        { code: 'ur', name: 'Urdu', native: 'اردو' },
        { code: 'vi', name: 'Vietnamese', native: 'Tiếng Việt' },
        { code: 'cy', name: 'Welsh', native: 'Cymraeg' },
        { code: 'yi', name: 'Yiddish', native: 'ייִדיש' },
      ];

      var gtCurrentLang = 'en';

      function gtBuildList(filter) {
        var list = document.getElementById('gt-lang-list');
        list.innerHTML = '';

        // Always show "Default (Original)" row at top, outside filter
        var defLi = document.createElement('li');
        defLi.classList.add('gt-default');
        if (gtCurrentLang === '__default__') defLi.classList.add('gt-active');
        defLi.innerHTML =
          '<span>&#10227; Default</span>' +
          '<span class="lang-native">Original</span>';
        defLi.onclick = function () {
          gtRestore();
        };
        list.appendChild(defLi);

        var q = (filter || '').toLowerCase().trim();
        var langs = q
          ? GT_LANGS.filter(function (l) {
              return (
                l.name.toLowerCase().includes(q) ||
                l.native.toLowerCase().includes(q)
              );
            })
          : GT_LANGS;

        if (!langs.length) {
          list.innerHTML +=
            '<li style="padding:10px 12px;font-family:Georgia,serif;font-size:12px;color:rgba(61,12,2,0.4);font-style:italic;">No language found</li>';
          return;
        }

        langs.forEach(function (l) {
          var li = document.createElement('li');
          if (l.code === gtCurrentLang) li.classList.add('gt-active');
          li.innerHTML =
            '<span>' +
            l.name +
            '</span>' +
            '<span class="lang-native">' +
            l.native +
            '</span>';
          li.onclick = function () {
            gtSelect(l.code);
          };
          list.appendChild(li);
        });
      }

      function gtFilterLangs(val) {
        gtBuildList(val);
      }

      function gtTogglePanel() {
        var panel = document.getElementById('gt-panel');
        panel.classList.toggle('open');
        if (panel.classList.contains('open')) {
          var search = document.getElementById('gt-search');
          search.value = '';
          gtBuildList('');
          setTimeout(function () {
            search.focus();
          }, 60);
        }
      }

      function gtRestore() {
        // Clear Google Translate cookie and reload to restore original language
        function deleteCookie(name) {
          document.cookie =
            name + '=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
          document.cookie =
            name +
            '=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=' +
            location.hostname;
          document.cookie =
            name +
            '=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=.' +
            location.hostname;
        }
        deleteCookie('googtrans');
        gtCurrentLang = '__default__';
        document.getElementById('gt-panel').classList.remove('open');
        location.reload();
      }

      function gtSelect(langCode) {
        gtCurrentLang = langCode;
        // Trigger Google Translate via its hidden native select
        var combo = document.querySelector('.goog-te-combo');
        if (combo) {
          combo.value = langCode;
          combo.dispatchEvent(new Event('change'));
        }
        document.getElementById('gt-panel').classList.remove('open');
        gtBuildList('');
      }

      // Close on outside click
      document.addEventListener('click', function (e) {
        var panel = document.getElementById('gt-panel');
        var btn = document.getElementById('gt-toggle-btn');
        if (
          panel &&
          btn &&
          !panel.contains(e.target) &&
          !btn.contains(e.target)
        ) {
          panel.classList.remove('open');
        }
      });

      // ── Permanently suppress Google Translate's top banner ──
      function gtHideBanner() {
        // Hide the iframe bar
        var banner = document.querySelector('.goog-te-banner-frame');
        if (banner) {
          banner.style.setProperty('display', 'none', 'important');
        }

        // Also hide by ID (Google sometimes uses this)
        var bannerById = document.getElementById('goog-gt-tt');
        if (bannerById) {
          bannerById.style.setProperty('display', 'none', 'important');
        }

        // Reset body top offset that Google forces
        document.body.style.setProperty('top', '0', 'important');
        document.body.style.setProperty('margin-top', '0', 'important');
        if (document.documentElement) {
          document.documentElement.style.setProperty(
            'margin-top',
            '0',
            'important',
          );
        }

        // Hide all VIpgJd elements (Google's Material banner classes)
        document.querySelectorAll('[class*="VIpgJd"]').forEach(function (el) {
          el.style.setProperty('display', 'none', 'important');
        });
      }

      // Watch for Google dynamically injecting its banner into the DOM
      var gtObserver = new MutationObserver(function (mutations) {
        mutations.forEach(function (m) {
          if (m.addedNodes.length) {
            gtHideBanner();
          }
        });
      });
      gtObserver.observe(document.documentElement, {
        childList: true,
        subtree: true,
      });

      // Belt-and-suspenders: also poll every 500ms for the first 10 seconds
      var gtPollCount = 0;
      var gtPollTimer = setInterval(function () {
        gtHideBanner();
        gtPollCount++;
        if (gtPollCount >= 20) clearInterval(gtPollTimer);
      }, 500);

      // Initialize Google Translate
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: 'en', autoDisplay: false },
          'google_translate_element',
        );
        // Hide banner immediately after init too
        setTimeout(gtHideBanner, 200);
        setTimeout(gtHideBanner, 800);
      }
    </script>

    <script
      type="text/javascript"
      src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
    ></script>

    <script type="module" src="/src/main.js"></script>
